<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Löv &amp; Bläck — en blogg</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,600;1,9..144,500&family=Inter:wght@400;500;600&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#1B1F3B;
    --parchment:#FFF8EE;
    --coral:#FF6B5B;
    --coral-dark:#C23F32;
    --violet:#7B5EA7;
    --violet-dark:#4E3A72;
    --gold:#E8B84B;
    --gold-dark:#8A6516;
    --teal:#2FA898;
    --teal-dark:#1B6A60;
    --ink-text:#2A2A2A;
    --muted:#7A7568;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:
      radial-gradient(circle at 15% 10%, rgba(232,184,75,0.10), transparent 40%),
      radial-gradient(circle at 85% 85%, rgba(123,94,167,0.14), transparent 45%),
      var(--ink);
    color:var(--ink-text);
    font-family:'Inter',sans-serif;
    min-height:100vh;
  }
  h1,h2,h3,.serif{ font-family:'Fraunces', serif; }
  .meta{ font-family:'Space Mono', monospace; letter-spacing:0.02em; }

  /* ---------- Lock screen ---------- */
  #lock-screen{
    min-height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    padding:24px;
  }
  .seal-card{
    width:100%;
    max-width:420px;
    background:var(--parchment);
    border-radius:6px;
    padding:48px 40px 40px;
    box-shadow:0 30px 60px rgba(0,0,0,0.35);
    text-align:center;
    animation:riseIn .7s cubic-bezier(.2,.8,.2,1) both;
  }
  @keyframes riseIn{
    from{opacity:0; transform:translateY(18px) scale(.98);}
    to{opacity:1; transform:translateY(0) scale(1);}
  }
  .seal{
    width:76px; height:76px;
    border-radius:50%;
    background:radial-gradient(circle at 35% 30%, var(--coral), var(--coral-dark));
    margin:0 auto 20px;
    display:flex; align-items:center; justify-content:center;
    color:var(--parchment);
    font-family:'Fraunces', serif;
    font-size:28px;
    box-shadow:0 6px 14px rgba(194,63,50,0.4), inset 0 -6px 10px rgba(0,0,0,0.15);
    transition:transform .5s cubic-bezier(.3,1.4,.5,1), box-shadow .5s ease;
  }
  .seal.cracked{
    transform:scale(1.15) rotate(-8deg);
    background:radial-gradient(circle at 35% 30%, var(--teal), var(--teal-dark));
    box-shadow:0 6px 18px rgba(27,106,96,0.45), inset 0 -6px 10px rgba(0,0,0,0.15);
  }
  .seal-card h1{ font-size:26px; margin:0 0 6px; color:var(--ink); }
  .seal-card p.sub{ color:var(--muted); font-size:14px; margin:0 0 28px; }
  #lock-form{ display:flex; flex-direction:column; gap:14px; }
  #password-input{
    font-family:'Space Mono', monospace;
    font-size:16px;
    padding:13px 16px;
    border-radius:4px;
    border:1.5px solid #E4D8C0;
    background:#fff;
    color:var(--ink);
    text-align:center;
    letter-spacing:0.08em;
    outline:none;
  }
  #password-input:focus{ border-color:var(--violet); box-shadow:0 0 0 3px rgba(123,94,167,0.15); }
  #password-input.shake{ animation:shake .4s; border-color:var(--coral-dark); }
  @keyframes shake{
    0%,100%{transform:translateX(0);}
    20%{transform:translateX(-8px);}
    40%{transform:translateX(8px);}
    60%{transform:translateX(-5px);}
    80%{transform:translateX(5px);}
  }
  #unlock-btn{
    font-family:'Inter',sans-serif;
    font-weight:600;
    font-size:15px;
    padding:13px;
    border:none;
    border-radius:4px;
    background:var(--ink);
    color:var(--parchment);
    cursor:pointer;
  }
  #unlock-btn:hover{ background:var(--violet-dark); }
  #lock-error{ color:var(--coral-dark); font-size:13px; min-height:18px; margin:0; }

  /* ---------- App layout ---------- */
  #app{ display:none; min-height:100vh; }
  .layout{
    max-width:1100px;
    margin:0 auto;
    padding:48px 24px 100px;
    display:grid;
    grid-template-columns:230px 1fr;
    gap:44px;
  }
  header.masthead{
    grid-column:1 / -1;
    margin-bottom:8px;
    border-bottom:1px solid rgba(255,248,238,0.15);
    padding-bottom:24px;
  }
  header.masthead h1{ color:var(--parchment); font-size:34px; margin:0; }
  header.masthead .tagline{ color:rgba(255,248,238,0.55); font-size:13px; margin-top:6px; }

  /* Sidebar */
  aside.archive{
    position:sticky;
    top:32px;
    align-self:start;
  }
  .archive h3{
    color:rgba(255,248,238,0.55);
    font-size:12px;
    text-transform:uppercase;
    letter-spacing:0.1em;
    margin:0 0 14px;
    font-family:'Inter',sans-serif;
    font-weight:600;
  }
  .archive-all{
    display:block;
    width:100%;
    text-align:left;
    background:none;
    border:none;
    color:var(--parchment);
    font-family:'Fraunces', serif;
    font-size:16px;
    padding:6px 0;
    cursor:pointer;
    margin-bottom:10px;
    opacity:0.85;
  }
  .archive-all.active{ color:var(--gold); opacity:1; }
  .year-block{ margin-bottom:6px; }
  .year-btn{
    display:flex;
    align-items:center;
    justify-content:space-between;
    width:100%;
    background:none;
    border:none;
    color:var(--parchment);
    font-family:'Fraunces', serif;
    font-size:17px;
    padding:8px 0;
    cursor:pointer;
    opacity:0.9;
  }
  .year-btn .count{
    font-family:'Space Mono', monospace;
    font-size:11px;
    color:rgba(255,248,238,0.45);
  }
  .month-list{
    list-style:none;
    margin:0 0 6px;
    padding:0 0 0 4px;
    display:none;
    border-left:2px solid rgba(255,248,238,0.15);
  }
  .month-list.open{ display:block; }
  .month-btn{
    display:flex;
    justify-content:space-between;
    width:100%;
    background:none;
    border:none;
    color:rgba(255,248,238,0.7);
    font-family:'Inter',sans-serif;
    font-size:13.5px;
    padding:7px 0 7px 14px;
    cursor:pointer;
    text-transform:capitalize;
  }
  .month-btn:hover{ color:var(--parchment); }
  .month-btn.active{ color:var(--gold); font-weight:600; }
  .month-btn .count{ font-family:'Space Mono', monospace; font-size:11px; color:rgba(255,248,238,0.4); }

  /* Posts */
  main{ min-width:0; }
  #filter-label{
    color:rgba(255,248,238,0.55);
    font-size:13px;
    margin:0 0 20px;
  }
  #posts-list{ display:flex; flex-direction:column; gap:22px; }
  .post-card{
    background:var(--parchment);
    border-radius:6px;
    padding:28px 30px;
    box-shadow:0 10px 24px rgba(0,0,0,0.18);
    border-left:6px solid var(--violet);
  }
  .post-meta{
    font-size:11.5px;
    color:var(--muted);
    margin-bottom:8px;
  }
  .post-card h2{ font-size:22px; margin:0 0 12px; color:var(--ink); }
  .post-body{
    font-size:15px;
    line-height:1.75;
    color:var(--ink-text);
    white-space:pre-wrap;
    margin-bottom:14px;
  }
  .post-images{
    display:flex;
    flex-wrap:wrap;
    gap:10px;
  }
  .post-images img{
    max-width:220px;
    max-height:220px;
    object-fit:cover;
    border-radius:4px;
    box-shadow:0 4px 10px rgba(0,0,0,0.15);
  }
  #empty-state{
    text-align:center;
    padding:60px 20px;
    color:rgba(255,248,238,0.5);
  }
  #empty-state h3{ color:rgba(255,248,238,0.8); font-size:20px; margin-bottom:8px; }
  #empty-state p{ font-size:14px; }

  @media (max-width:760px){
    .layout{ grid-template-columns:1fr; }
    aside.archive{ position:static; }
  }
</style>
</head>
<body>

<div id="lock-screen">
  <div class="seal-card">
    <div class="seal" id="seal">L&amp;B</div>
    <h1>Löv &amp; Bläck</h1>
    <p class="sub">Ett privat rum för ord. Ange lösenordet för att öppna sidan.</p>
    <form id="lock-form">
      <input type="password" id="password-input" placeholder="Lösenord" autocomplete="off">
      <p id="lock-error"></p>
      <button type="submit" id="unlock-btn">Lås upp</button>
    </form>
  </div>
</div>

<div id="app">
  <div class="layout">
    <header class="masthead">
      <h1>Löv &amp; Bläck</h1>
      <p class="tagline meta">en samling anteckningar, tankar och resor</p>
    </header>

    <aside class="archive">
      <h3>Arkiv</h3>
      <button class="archive-all active" id="show-all">Alla inlägg</button>
      <div id="year-list"></div>
    </aside>

    <main>
      <p id="filter-label"></p>
      <div id="posts-list"></div>
      <div id="empty-state" style="display:none;">
        <h3>Inga inlägg ännu</h3>
        <p>Nya inlägg dyker upp här så fort de publiceras.</p>
      </div>
    </main>
  </div>
</div>

<script>
const CORRECT_PASSWORD = "Edgar";

const lockScreen = document.getElementById('lock-screen');
const app = document.getElementById('app');
const lockForm = document.getElementById('lock-form');
const passwordInput = document.getElementById('password-input');
const lockError = document.getElementById('lock-error');
const seal = document.getElementById('seal');

lockForm.addEventListener('submit', function(e){
  e.preventDefault();
  if(passwordInput.value === CORRECT_PASSWORD){
    seal.classList.add('cracked');
    lockError.textContent = '';
    setTimeout(function(){
      lockScreen.style.display = 'none';
      app.style.display = 'block';
      loadPosts();
    }, 350);
  } else {
    lockError.textContent = 'Fel lösenord. Försök igen.';
    passwordInput.classList.remove('shake');
    void passwordInput.offsetWidth;
    passwordInput.classList.add('shake');
    passwordInput.value = '';
  }
});

const yearListEl = document.getElementById('year-list');
const showAllBtn = document.getElementById('show-all');
const postsListEl = document.getElementById('posts-list');
const emptyStateEl = document.getElementById('empty-state');
const filterLabelEl = document.getElementById('filter-label');

let allPosts = [];
let activeFilter = null;

const MONTHS_SV = ['januari','februari','mars','april','maj','juni','juli','augusti','september','oktober','november','december'];

async function loadPosts(){
  try{
    const res = await fetch('./posts.json', {cache:'no-store'});
    if(!res.ok){ allPosts = []; }
    else { allPosts = await res.json(); }
  } catch(err){
    allPosts = [];
  }
  allPosts.sort(function(a,b){ return new Date(b.date) - new Date(a.date); });
  buildArchive();
  renderPosts();
}

function buildArchive(){
  const tree = {};
  allPosts.forEach(function(post){
    const d = new Date(post.date);
    const y = d.getFullYear();
    const m = d.getMonth();
    if(!tree[y]) tree[y] = {};
    if(!tree[y][m]) tree[y][m] = 0;
    tree[y][m]++;
  });
  const years = Object.keys(tree).sort(function(a,b){ return b - a; });
  yearListEl.innerHTML = '';
  years.forEach(function(year){
    const yearBlock = document.createElement('div');
    yearBlock.className = 'year-block';

    const yearCount = Object.values(tree[year]).reduce(function(a,b){ return a+b; }, 0);
    const yearBtn = document.createElement('button');
    yearBtn.className = 'year-btn';
    yearBtn.innerHTML = '<span>' + year + '</span><span class="count">' + yearCount + '</span>';

    const monthList = document.createElement('ul');
    monthList.className = 'month-list';

    const months = Object.keys(tree[year]).sort(function(a,b){ return b - a; });
    months.forEach(function(m){
      const li = document.createElement('li');
      const btn = document.createElement('button');
      btn.className = 'month-btn';
      btn.dataset.year = year;
      btn.dataset.month = m;
      btn.innerHTML = '<span>' + MONTHS_SV[m] + '</span><span class="count">' + tree[year][m] + '</span>';
      btn.addEventListener('click', function(){
        activeFilter = {year: parseInt(year), month: parseInt(m)};
        document.querySelectorAll('.month-btn').forEach(function(b){ b.classList.remove('active'); });
        btn.classList.add('active');
        showAllBtn.classList.remove('active');
        renderPosts();
      });
      li.appendChild(btn);
      monthList.appendChild(li);
    });

    yearBtn.addEventListener('click', function(){
      monthList.classList.toggle('open');
    });

    yearBlock.appendChild(yearBtn);
    yearBlock.appendChild(monthList);
    yearListEl.appendChild(yearBlock);
  });

  if(years.length > 0){
    yearListEl.querySelector('.month-list').classList.add('open');
  }
}

showAllBtn.addEventListener('click', function(){
  activeFilter = null;
  document.querySelectorAll('.month-btn').forEach(function(b){ b.classList.remove('active'); });
  showAllBtn.classList.add('active');
  renderPosts();
});

function formatDate(iso){
  const d = new Date(iso);
  return d.toLocaleDateString('sv-SE', { year:'numeric', month:'long', day:'numeric' });
}

function renderPosts(){
  let posts = allPosts;
  if(activeFilter){
    posts = allPosts.filter(function(p){
      const d = new Date(p.date);
      return d.getFullYear() === activeFilter.year && d.getMonth() === activeFilter.month;
    });
    filterLabelEl.textContent = 'Visar inlägg från ' + MONTHS_SV[activeFilter.month] + ' ' + activeFilter.year;
  } else {
    filterLabelEl.textContent = 'Visar alla inlägg';
  }

  postsListEl.innerHTML = '';
  if(posts.length === 0){
    emptyStateEl.style.display = 'block';
    return;
  }
  emptyStateEl.style.display = 'none';

  posts.forEach(function(post){
    const card = document.createElement('div');
    card.className = 'post-card';

    let imagesHtml = '';
    if(post.images && post.images.length){
      imagesHtml = '<div class="post-images">' + post.images.map(function(src){
        return '<img src="' + src + '" alt="">';
      }).join('') + '</div>';
    }

    card.innerHTML =
      '<div class="post-meta meta">' + formatDate(post.date) + '</div>' +
      '<h2>' + escapeHtml(post.title) + '</h2>' +
      '<div class="post-body">' + escapeHtml(post.body) + '</div>' +
      imagesHtml;

    postsListEl.appendChild(card);
  });
}

function escapeHtml(str){
  const div = document.createElement('div');
  div.textContent = str || '';
  return div.innerHTML;
}
</script>
</body>
</html>
